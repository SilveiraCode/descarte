{% extends 'index.html' %}

{% block main %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow border-0" style="width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-4 text-success">Acessar Sistema</h3>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Entrar</button>
            </form>
            
            <div class="mt-4 text-center">
                <small class="text-muted">É novo por aqui? <a href="{% url 'cadastro' %}" class="text-success fw-bold">Crie sua conta</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
