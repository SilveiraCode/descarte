{% extends 'index.html' %}

{% block main %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #2d5a27;">Pontos de Descarte Próximos</h2>
        <span class="badge bg-success">Clique no mapa para marcar uma nova coordenada</span>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="list-group shadow-sm" id="lista-pontos" style="max-height: 500px; overflow-y: auto;">
                <div class="list-group-item disabled bg-light"><strong>Ecopontos Cadastrados</strong></div>
            </div>
            
            <div class="mt-3 p-3 bg-white border rounded shadow-sm">
                <h6>Coordenadas Selecionadas:</h6>
                <div class="row">
                    <div class="col">
                        <input type="text" id="id_latitude" class="form-control form-control-sm" placeholder="Lat" readonly>
                    </div>
                    <div class="col">
                        <input type="text" id="id_longitude" class="form-control form-control-sm" placeholder="Lng" readonly>
                    </div>
                </div>
                <small class="text-muted">Clique no mapa para alterar.</small>
            </div>
        </div>

        <div class="col-md-8">
            <div id="map" class="shadow rounded" style="height: 550px; width: 100%;"></div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    const map = L.map('map').setView([-23.5505, -46.6333], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const pontos = JSON.parse('{{ pontos_json|safe }}');
    const listaHtml = document.getElementById('lista-pontos');

    pontos.forEach(ponto => {
        const marker = L.marker([ponto.lat, ponto.lng]).addTo(map);
        marker.bindPopup(`<b>${ponto.nome}</b><br>${ponto.info}`);

        listaHtml.innerHTML += `
            <button class="list-group-item list-group-item-action" onclick="focarPonto(${ponto.lat}, ${ponto.lng})">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">${ponto.nome}</h5>
                </div>
                <p class="mb-1">${ponto.info}</p>
            </button>
        `;
    });

    function focarPonto(lat, lng) {
        map.setView([lat, lng], 16);
    }

    var marcadorClique;
    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        if (marcadorClique) {
            marcadorClique.setLatLng(e.latlng);
        } else {
            marcadorClique = L.marker(e.latlng, {draggable: true}).addTo(map);
            marcadorClique.bindPopup("Local Selecionado").openPopup();
        }

        document.getElementById('id_latitude').value = lat.toFixed(6);
        document.getElementById('id_longitude').value = lng.toFixed(6);
    });
</script>
{% endblock %}
